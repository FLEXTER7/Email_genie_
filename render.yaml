services:
  - type: web
    name: email-genie
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: email-genie-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAILGUN_SIGNING_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DB_PATH
        value: /var/data/email-genie.db
